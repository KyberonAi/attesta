# ──────────────────────────────────────────────────────────────
# AI Code Review — Claude Code + Codex
# Claude:  security · architecture · concurrency analysis
# Codex:   code-smell · correctness · test-gap detection
# Runs on pull requests only.
# ──────────────────────────────────────────────────────────────
name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ── Claude Code: security + architecture + concurrency ──────
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request with focus on:

            ## Security Review
            - Injection vulnerabilities (command, SQL, XSS, template)
            - Secrets or credentials in code
            - Unsafe deserialization or eval usage
            - Input validation gaps at system boundaries
            - Insecure defaults or configurations

            ## Architecture Review
            - API surface changes and backward compatibility
            - Dependency coupling and separation of concerns
            - Error handling patterns and failure modes
            - Type safety and interface contracts (Python protocols, TS interfaces)

            ## Concurrency Review
            - Race conditions in async code
            - Proper use of asyncio primitives
            - Thread safety of shared state
            - Deadlock potential in multi-party challenges

            ## Test Gap Analysis
            - Identify untested code paths in changed files
            - Missing edge case coverage
            - Missing error/exception path tests
            - Suggest specific test cases that should be added

            Format findings as:
            - 🔴 **Critical**: Must fix before merge
            - 🟡 **Warning**: Should address
            - 🟢 **Suggestion**: Nice to have
            - 🧪 **Test gap**: Missing test coverage
          timeout_minutes: 10

  # ── Codex: code smell + correctness ─────────────────────────
  codex-review:
    name: Codex Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
            -- '*.py' '*.ts' '*.tsx' '*.js' | head -50)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Codex Review
        if: steps.changed.outputs.files != ''
        uses: openai/codex-action@v1
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review the following changed files for code quality issues:

            ${{ steps.changed.outputs.files }}

            Focus on:
            1. **Code smells**: Dead code, god functions, excessive complexity,
               magic numbers, duplicated logic, poor naming
            2. **Correctness**: Logic errors, off-by-one, null/undefined handling,
               type coercion bugs, missing return values
            3. **Test gaps**: For each changed file, check if corresponding test
               files exist and cover the new/modified code paths

            Format each finding as a PR review comment with file path and line number.
