# ──────────────────────────────────────────────────────────────
# Publish — PyPI · npm · community packages
# Triggered by GitHub Releases.
# Tag conventions:
#   v*           → core Python (PyPI) + core TypeScript (npm)
#   n8n-v*       → n8n community node (npm)
#   flowise-v*   → Flowise community node (npm)
#   dify-v*      → Dify plugin (.difypkg artifact)
# ──────────────────────────────────────────────────────────────
name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # trusted publishing (PyPI)

jobs:
  # ── Pre-flight: run full CI before publishing ────────────────
  ci-check:
    name: Pre-publish CI
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/ci.yaml

  # ── PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci-check
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/attesta/
    defaults:
      run:
        working-directory: python/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build sdist + wheel
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ── npm (@attesta/core) ──────────────────────────────────────
  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci-check
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@attesta/core
    defaults:
      run:
        working-directory: typescript/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci || npm install

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── n8n community node ───────────────────────────────────────
  publish-n8n:
    name: Publish n8n node
    if: startsWith(github.ref, 'refs/tags/n8n-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/n8n-nodes-attesta/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install & build
        run: |
          npm ci || npm install
          npm run build
          npm test

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#n8n-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── Flowise community node ──────────────────────────────────
  publish-flowise:
    name: Publish Flowise node
    if: startsWith(github.ref, 'refs/tags/flowise-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flowise-attesta/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install & build
        run: |
          npm ci || npm install
          npm run build
          npm test

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#flowise-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── Dify plugin ──────────────────────────────────────────────
  publish-dify:
    name: Package Dify plugin
    if: startsWith(github.ref, 'refs/tags/dify-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dify-attesta/
    steps:
      - uses: actions/checkout@v4

      - name: Package as .difypkg
        run: |
          VERSION=$(grep 'version:' manifest.yaml | head -1 | awk '{print $2}')
          tar -czf attesta-${VERSION}.difypkg \
            manifest.yaml \
            _assets/ \
            provider/ \
            tools/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dify-attesta-plugin
          path: packages/dify-attesta/*.difypkg
