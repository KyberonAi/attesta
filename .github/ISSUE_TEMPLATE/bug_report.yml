name: Bug report
description: Report a reproducible defect in Attesta OSS components
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail for maintainers to reproduce quickly.

  - type: input
    id: component
    attributes:
      label: Component
      description: Which area is affected?
      placeholder: python core / typescript core / docs / langflow package / dify package
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include exact commands, inputs, and expected/actual behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste stack trace, logs, or screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details used for the repro.
      placeholder: |
        OS:
        Python:
        Node:
        Attesta version:
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest main branch or latest release.
          required: true
