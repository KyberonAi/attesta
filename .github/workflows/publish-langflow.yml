name: Publish langflow-attesta to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test Langflow package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install attesta core + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./python[dev,yaml]"
      - name: Run Langflow package tests
        run: PYTHONPATH=python/src pytest -q packages/langflow-attesta/tests

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build packages/langflow-attesta
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: langflow-dist
          path: packages/langflow-attesta/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: langflow-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
