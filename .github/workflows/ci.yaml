name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  boundary:
    name: OSS Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check OSS boundary
        run: ./scripts/check_release_boundary.sh

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: boundary
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps
        run: pip install -e ".[dev,yaml]"
      - name: Run tests
        run: pytest -q

  typescript:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: boundary
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
