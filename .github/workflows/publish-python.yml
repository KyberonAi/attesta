name: Publish attesta to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,yaml]"
      - name: Run tests
        run: pytest -q

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build
      - name: Check artifacts for proprietary leaks
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y ripgrep
          if tar -tf dist/*.tar.gz | rg -i '(attesta-proprietary|llm_scorer|domains/presets/(healthcare|finance|infrastructure|legal)\.py)'; then
            echo "Detected proprietary markers in sdist."
            exit 1
          fi
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
